<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scratch Buddy - AI Coding Assistant</title>

<style>
:root {
    --primary-color: #4D97FF;
    --accent-color: #FFAB1A;
    --bg-color: #F9F9F9;
    --chat-bg: #FFFFFF;
    --text-color: #333333;
    --user-msg-bg: #E3F2FD;
    --ai-msg-bg: #F1F1F1;
    --border-radius: 12px;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

body {
    background: var(--bg-color);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

header {
    background: var(--chat-bg);
    padding: 12px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
}

.logo {
    font-weight: bold;
    color: var(--primary-color);
}

.status {
    color: green;
    font-size: 12px;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg {
    max-width: 80%;
    padding: 10px;
    border-radius: var(--border-radius);
    white-space: pre-wrap;
}

.user {
    background: var(--user-msg-bg);
    align-self: flex-end;
}

.ai {
    background: var(--ai-msg-bg);
    align-self: flex-start;
}

#input {
    display: flex;
    padding: 10px;
    gap: 10px;
    border-top: 1px solid #ddd;
}

textarea {
    flex: 1;
    resize: none;
    padding: 10px;
}

button {
    padding: 10px 15px;
    background: var(--primary-color);
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <div class="logo">Scratch Buddy</div>
    <div class="status">NVIDIA Ready</div>
</header>

<div id="chat">
    <div class="msg ai">Hello! Ask me to generate Scratch code.</div>
</div>

<div id="input">
    <textarea id="text" placeholder="Type here..."></textarea>
    <button onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("text");
const API = "/api/chat";

function add(role, text) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

async function send() {
    const text = input.value.trim();
    if (!text) return;

    add("user", text);
    input.value = "";

    const loading = add("ai", "Thinking...");

    try {
        const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "z-ai/glm4.7",
                messages: [
                    {
                        role: "system",
                        content: "You are Scratch Buddy. Output Scratch 3.0 block-style instructions."
                    },
                    {
                        role: "user",
                        content: text
                    }
                ]
            })
        });

        const data = await res.json();
        const msg = data?.choices?.[0]?.message;

        const reply =
            msg?.content ||
            msg?.reasoning_content ||
            "No response from model.";

        loading.innerText = reply;

    } catch (e) {
        loading.innerText = "Error: " + e.message;
    }
}
</script>

</body>
</html>
