<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Builder</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: #1e293b;
            --sidebar-bg: #1e293b;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --user-msg-bg: #6366f1;
            --ai-msg-bg: #334155;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            background-color: var(--sidebar-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .brand {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        select {
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: var(--primary);
        }

        /* Chat Area */
        #chat {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 0.95rem;
            position: relative;
            animation: fadeIn 0.3s ease-out;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            color: white;
            border-bottom-right-radius: 2px;
            box-shadow: 0 4px 6px rgba(99, 102, 241, 0.2);
        }

        .ai {
            align-self: flex-start;
            background-color: var(--ai-msg-bg);
            color: var(--text-main);
            border-bottom-left-radius: 2px;
            white-space: pre-wrap;
            border: 1px solid var(--border-color);
        }

        .ai strong { color: #fff; }
        .ai code { 
            background: rgba(0,0,0,0.3); 
            padding: 2px 4px; 
            border-radius: 4px; 
            font-family: 'Consolas', monospace; 
            font-size: 0.9em;
        }

        /* Input Area */
        .input-container {
            background-color: var(--sidebar-bg);
            border-top: 1px solid var(--border-color);
            padding: 1.5rem;
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        textarea {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            resize: none;
            height: 60px;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        button#send-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0 1.5rem;
            height: 60px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button#send-btn:hover {
            background-color: var(--primary-hover);
        }

        button#send-btn:active {
            transform: scale(0.98);
        }

        button#send-btn:disabled {
            background-color: var(--border-color);
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Loading Indicator */
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 4px 8px;
        }
        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @media (max-width: 600px) {
            header { flex-direction: column; gap: 10px; align-items: stretch; }
            .controls { justify-content: space-between; }
            .msg { max-width: 90%; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M12 2a10 10 0 0 1 10 10"></path><path d="M12 12 2.1 12.05"></path></svg>
        AI Builder
    </div>
    <div class="controls">
        <select id="mode">
            <option value="code">Code Mode</option>
            <option value="website">Website Mode</option>
            <option value="scratch">Scratch Mode</option>
            <option value="game">Game Mode</option>
        </select>
    </div>
</header>

<div id="chat">
    <div class="msg ai">
        Hello! I'm your AI Builder. Select a mode above and describe what you want to build.
    </div>
</div>

<div class="input-container">
    <div class="input-wrapper">
        <textarea id="input" placeholder="Describe your project idea..."></textarea>
    </div>
    <button id="send-btn" onclick="send()">
        <span>Generate</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
</div>

<script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");

    // Allow sending with Enter key
    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            send();
        }
    });

    function add(text, cls) {
        const div = document.createElement("div");
        div.className = "msg " + cls;
        
        if (text === "") {
            div.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
        } else {
            div.textContent = text;
        }
        
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }

    async function send() {
        const text = input.value.trim();
        const mode = document.getElementById("mode").value;

        if (!text) return;

        // UI Updates
        add(text, "user");
        input.value = "";
        input.style.height = "60px"; // Reset height
        sendBtn.disabled = true;
        sendBtn.innerHTML = '<span>Building...</span>';

        const aiBox = add("", "ai");

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    mode,
                    messages: [{ role: "user", content: text }]
                })
            });

            if (!res.ok) throw new Error("Network response was not ok");

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";
            let hasStarted = false;

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split("\n");
                buffer = lines.pop();

                for (let line of lines) {
                    if (!line.startsWith("data:")) continue;
                    const jsonStr = line.replace("data: ", "");
                    if (jsonStr === "[DONE]") return;

                    try {
                        const data = JSON.parse(jsonStr);
                        const delta = data.choices?.[0]?.delta?.content;

                        if (delta) {
                            if (!hasStarted) {
                                aiBox.textContent = ""; // Clear loading indicator
                                hasStarted = true;
                            }
                            aiBox.textContent += delta;
                            chat.scrollTop = chat.scrollHeight;
                        }
                    } catch (e) {}
                }
            }
        } catch (error) {
            console.error(error);
            if (aiBox.textContent === "") {
                aiBox.textContent = "Error: Could not connect to the AI server.";
            } else {
                aiBox.textContent += "\n\n[Connection interrupted]";
            }
        } finally {
            sendBtn.disabled = false;
            sendBtn.innerHTML = '<span>Generate</span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>';
            input.focus();
        }
    }
</script>

</body>
</html>
