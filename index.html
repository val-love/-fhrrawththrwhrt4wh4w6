<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg-body: #09090b;
            --bg-surface: #18181b;
            --bg-surface-hover: #27272a;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --primary-hover: #4f46e5;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border-color: #27272a;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background-color: rgba(9, 9, 11, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #chat {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        .msg {
            max-width: 85%;
            padding: 1.25rem 1.5rem;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 0.95rem;
        }
        .user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .ai {
            align-self: flex-start;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }
        .ai pre {
            background: #0d0d10;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--border-color);
        }
        .typing-indicator {
            display: inline-flex;
            gap: 5px;
        }
        .typing-dot {
            width: 6px; height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: pulse 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .input-container {
            padding: 1.5rem 2rem 2rem;
            background: transparent;
        }
        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 8px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }
        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 12px;
            font-size: 1rem;
            resize: none;
            max-height: 200px;
            height: 52px;
        }
        button#send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<header>
    <div class="brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a10 10 0 1 0 10 10H12V2z"></path>
            <path d="M12 2a10 10 0 0 1 10 10"></path>
        </svg>
        <span>AI Builder</span>
    </div>
    <div class="controls">
        <select id="mode">
            <option value="code">Code Mode</option>
            <option value="websitee">Website Mode</option>
            <option value="scratch">Scratch Mode</option>
            <option value="game">Game Mode</option>
            <option value="chat">Chat</option>
        </select>
    </div>
</header>

<div id="chat">
    <div class="msg ai">Hello! I'm your AI Builder. Select a mode and tell me what you want to build.</div>
</div>

<div class="input-container">
    <div class="input-wrapper">
        <textarea id="input" placeholder="Describe your project idea..." rows="1"></textarea>
        <button id="send-btn" onclick="send()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>
</div>

<script>
    marked.setOptions({
        highlight: (code, lang) => {
            const language = highlight.getLanguage(lang) ? lang : 'plaintext';
            return highlight.highlight(code, { language }).value;
        },
        breaks: true
    });

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");

    // Auto resize textarea
    input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 200) + 'px';
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            send();
        }
    });

    function addMessage(content, role) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        if (content === "") {
            div.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
        } else {
            div.innerHTML = marked.parse(content);
        }
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }

    async function send() {
        const text = input.value.trim();
        const mode = document.getElementById("mode").value;
        if (!text) return;

        addMessage(text, "user");
        input.value = "";
        input.style.height = "52px";
        sendBtn.disabled = true;
        sendBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>`;

        const aiBox = addMessage("", "ai");
        let fullResponse = "";

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ mode, messages: [{ role: "user", content: text }] })
            });

            if (!res.ok) throw new Error("Server error");

            const reader = res.body.getReader();
            const decoder = new TextDecoder();

            let buffer = "";

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split("\n");
                buffer = lines.pop() || "";

                for (let line of lines) {
                    line = line.trim();
                    if (!line) continue;

                    // Handle both raw text and SSE "data: " format
                    if (line.startsWith("data: ")) {
                        line = line.replace("data: ", "").trim();
                    }
                    if (line === "[DONE]" || line === "") continue;

                    fullResponse += line;

                    // Show raw text while streaming (smooth & fast)
                    aiBox.textContent = fullResponse;
                    chat.scrollTop = chat.scrollHeight;
                }
            }

            // Final render with beautiful markdown + syntax highlighting
            aiBox.innerHTML = marked.parse(fullResponse);

        } catch (err) {
            console.error(err);
            aiBox.innerHTML = fullResponse 
                ? marked.parse(fullResponse) + `<br><br><em style="color:#f87171;">[Connection interrupted]</em>`
                : `<em style="color:#f87171;">Error: Could not connect to AI.</em>`;
        } finally {
            sendBtn.disabled = false;
            sendBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>`;
            input.focus();
        }
    }
</script>
</body>
</html>
