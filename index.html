<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scratch Buddy</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    padding: 12px;
    background: #4D97FF;
    color: white;
    font-weight: bold;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg {
    padding: 10px;
    border-radius: 10px;
    max-width: 80%;
    white-space: pre-wrap;
}

.user {
    background: #dbeafe;
    align-self: flex-end;
}

.ai {
    background: #eee;
    align-self: flex-start;
}

#inputBar {
    display: flex;
    padding: 10px;
    background: white;
    gap: 10px;
}

textarea {
    flex: 1;
    resize: none;
    padding: 10px;
}

button {
    padding: 10px 15px;
    background: #4D97FF;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<header>Scratch Buddy (Streaming)</header>

<div id="chat"></div>

<div id="inputBar">
    <textarea id="input" placeholder="Type here..."></textarea>
    <button onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMsg(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

async function send() {
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    const aiBox = addMsg("", "ai");

    const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            model: "z-ai/glm4.7",
            stream: true,   // 🔥 IMPORTANT FIX
            messages: [
                {
                    role: "system",
                    content: "You are Scratch Buddy, a Scratch 3.0 coding assistant. Return simple block-style instructions."
                },
                {
                    role: "user",
                    content: text
                }
            ]
        })
    });

    if (!res.body) {
        aiBox.textContent = "No stream support from server.";
        return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });

        // handle SSE chunks
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (let line of lines) {
            if (!line.trim()) continue;

            // NVIDIA/OpenAI style streaming
            if (line.startsWith("data:")) {
                const jsonStr = line.replace("data:", "").trim();

                if (jsonStr === "[DONE]") return;

                try {
                    const json = JSON.parse(jsonStr);
                    const token = json.choices?.[0]?.delta?.content || "";
                    aiBox.textContent += token;
                    chat.scrollTop = chat.scrollHeight;
                } catch (e) {}
            }
        }
    }
}
</script>

</body>
</html>
