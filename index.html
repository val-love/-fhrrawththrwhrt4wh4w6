<!DOCTYPE html>
<html>
<head>
<title>AI Builder</title>
<style>
body { font-family: Arial; background:#0f0f0f; color:white; margin:0; }
header { padding:10px; background:#222; display:flex; gap:10px; }
select, button, textarea {
    padding:8px;
    font-size:14px;
}
#chat { padding:10px; height:80vh; overflow:auto; }
.msg { margin:10px 0; padding:10px; border-radius:8px; }
.user { background:#1e3a8a; }
.ai { background:#333; white-space:pre-wrap; }
textarea { width:100%; height:60px; }
</style>
</head>

<body>

<header>
    <select id="mode">
        <option value="code">Code</option>
        <option value="website">Website</option>
        <option value="scratch">Scratch</option>
        <option value="game">Game</option>
    </select>
    <button onclick="send()">Generate</button>
</header>

<div id="chat"></div>

<textarea id="input" placeholder="Type your idea..."></textarea>

<script>
const chat = document.getElementById("chat");

function add(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

async function send() {
    const input = document.getElementById("input").value;
    const mode = document.getElementById("mode").value;

    if (!input) return;

    add(input, "user");
    document.getElementById("input").value = "";

    const aiBox = add("", "ai");

    const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            mode,
            messages: [{ role: "user", content: input }]
        })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    let buffer = "";

    while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (let line of lines) {
            if (!line.startsWith("data:")) continue;

            const jsonStr = line.replace("data: ", "");

            if (jsonStr === "[DONE]") return;

            try {
                const data = JSON.parse(jsonStr);
                const delta = data.choices?.[0]?.delta?.content;

                if (delta) {
                    aiBox.textContent += delta;
                    chat.scrollTop = chat.scrollHeight;
                }
            } catch (e) {}
        }
    }
}
</script>

</body>
</html>
