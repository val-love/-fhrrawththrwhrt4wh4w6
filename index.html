<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scratch Buddy</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}
header {
    padding: 12px;
    background: #4D97FF;
    color: white;
    font-weight: bold;
}
#chat {
    height: calc(100vh - 120px);
    overflow-y: auto;
    padding: 10px;
}
.msg {
    padding: 10px;
    margin: 8px 0;
    border-radius: 10px;
    max-width: 80%;
}
.user { background: #dbeafe; margin-left: auto; }
.bot { background: #eee; margin-right: auto; white-space: pre-wrap; }
#inputBox {
    display: flex;
    padding: 10px;
    gap: 10px;
}
textarea {
    flex: 1;
    padding: 10px;
}
button {
    padding: 10px 15px;
    background: #4D97FF;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<header>Scratch Buddy (Streaming Fixed)</header>

<div id="chat"></div>

<div id="inputBox">
    <textarea id="input" placeholder="Type here..."></textarea>
    <button onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMsg(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

async function send() {
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    const botMsg = addMsg("", "bot");

    const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            model: "z-ai/glm4.7",
            messages: [
                {
                    role: "system",
                    content: "You are Scratch Buddy. Return ONLY Scratch block instructions."
                },
                { role: "user", content: text }
            ]
        })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    let buffer = "";

    while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (let line of lines) {
            line = line.trim();

            if (!line.startsWith("data:")) continue;

            const jsonStr = line.replace("data: ", "");

            if (jsonStr === "[DONE]") return;

            try {
                const data = JSON.parse(jsonStr);

                const delta = data.choices?.[0]?.delta;

                if (delta?.content) {
                    botMsg.textContent += delta.content;
                    chat.scrollTop = chat.scrollHeight;
                }
            } catch (e) {}
        }
    }
}
</script>

</body>
</html>
